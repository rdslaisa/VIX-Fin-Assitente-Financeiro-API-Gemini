name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Checar sintaxe do backend
        run: python -m py_compile backend/*.py

      - name: Checar erros óbvios com flake8
        run: |
          pip install flake8
          flake8 backend --select=E9,F63,F7,F82 --show-source
